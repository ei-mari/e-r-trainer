<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101820"/><stop offset=".62" stop-color="#20251b"/><stop offset="1" stop-color="#3a3212"/></linearGradient>
    <style>
      .line{font-family:Avenir Next,Arial,sans-serif;font-size:34px;fill:#fff7df}
      .stress{fill:#ffc857;font-weight:800}
      .soft{fill:#9aa5a6}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="92" y="104" font-family="Avenir Next, Arial" font-size="25" letter-spacing="4" fill="#ffc857">BUMBLE BEE PRACTICE</text>
  <text x="92" y="174" font-family="Georgia, serif" font-size="64" fill="#fff7df">Read it until the rhythm clicks.</text>
  <text x="94" y="228" font-family="Avenir Next, Arial" font-size="27" fill="#aeb9bb">数分間、強勢のある語を大きく・長く・はっきり</text>
  <g transform="translate(1266 76)">
    <ellipse cx="105" cy="85" rx="83" ry="52" fill="#ffc857"/>
    <path d="M42 70h126M35 89h140M50 108h112" stroke="#38291a" stroke-width="15" stroke-linecap="round" opacity=".78"/>
    <circle cx="74" cy="57" r="10" fill="#1b2026"/><circle cx="137" cy="57" r="10" fill="#1b2026"/>
    <path d="M88 119q22 16 46 0" fill="none" stroke="#1b2026" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="29" cy="28" rx="34" ry="21" fill="#d8f7ff" opacity=".58" transform="rotate(-24 29 28)"/>
    <ellipse cx="181" cy="28" rx="34" ry="21" fill="#d8f7ff" opacity=".58" transform="rotate(24 181 28)"/>
  </g>
  <g class="line">
    <text x="120" y="324"><tspan class="soft">B:</tspan> <tspan class="stress">Gary</tspan>, you <tspan class="stress">know</tspan> I <tspan class="stress">don't</tspan> <tspan class="stress">like</tspan> <tspan class="stress">wak</tspan>ing <tspan class="stress">up</tspan></text>
    <text x="120" y="383">to a <tspan class="stress">dirt</tspan>y <tspan class="stress">kitch</tspan>en.</text>
    <text x="120" y="469"><tspan class="soft">G:</tspan> <tspan class="soft">Who</tspan> <tspan class="stress">cares?</tspan></text>
    <text x="120" y="528"><tspan class="soft">B:</tspan> <tspan class="stress">I care!</tspan> <tspan class="stress">All right?</tspan> <tspan class="stress">I care!</tspan></text>
    <text x="120" y="587">I <tspan class="stress">bust</tspan>ed my <tspan class="stress">ass</tspan> <tspan class="stress">all day</tspan> <tspan class="stress">clean</tspan>ing this <tspan class="stress">house</tspan></text>
    <text x="120" y="646">and then <tspan class="stress">cook</tspan>ing <tspan class="stress">that meal.</tspan> And I <tspan class="stress">worked</tspan> today.</text>
    <text x="120" y="705">It would be <tspan class="stress">nice</tspan> if you <tspan class="stress">said thank</tspan> you and <tspan class="stress">helped</tspan> me</text>
    <text x="120" y="764">with the <tspan class="stress">dish</tspan>es.</text>
  </g>
  <rect x="116" y="806" width="1368" height="1" fill="#fff" opacity=".17"/>
  <text x="120" y="852" font-family="Avenir Next,Arial" font-size="25" fill="#aeb9bb">Pair practice / breakout / repeat-after-me</text>
</svg>
