    <filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffe21f" flood-opacity=".5"/><feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".68"/></filter>
    <style>.jp{font-family:Hiragino Sans,Yu Gothic,Meiryo,Avenir Next,Arial,sans-serif}.sans{font-family:Avenir Next,Montserrat,Arial,sans-serif}</style>
