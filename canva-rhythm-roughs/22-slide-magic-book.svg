    <text x="44" y="60" class="jp" font-size="33" font-weight="1000" fill="#fff">Slack / Zoom のチャット欄を</text>
    <text x="44" y="106" class="jp" font-size="33" font-weight="1000" fill="#ffe21f">確認してね</text>
  </g>
