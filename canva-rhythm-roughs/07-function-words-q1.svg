<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity=".74"/>
      <stop offset=".55" stop-color="#000" stop-opacity=".22"/>
      <stop offset="1" stop-color="#000" stop-opacity=".05"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".78"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity=".95"/>
    </filter>
    <style>
      .jp{font-family:Hiragino Sans, Yu Gothic, Meiryo, Avenir Next, Arial, sans-serif}
      .sans{font-family:Avenir Next, Montserrat, Arial, sans-serif}
    </style>
  </defs>
  <image href="rhythm-challenge-keyvisual.png" x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="900" fill="url(#shade)"/>
  <g transform="translate(72 52)">
    <rect width="294" height="66" rx="33" fill="#111" opacity=".94"/>
    <rect x="7" y="7" width="280" height="52" rx="26" fill="none" stroke="#ffe21f" stroke-width="3" opacity=".75"/>
    <text x="28" y="43" class="sans" font-size="25" font-weight="900" fill="#ffe21f" letter-spacing="2">LESSON 01</text>
  </g>
  <g filter="url(#shadow)">
    <text x="76" y="224" class="sans" font-size="34" font-weight="900" fill="#ffe21f" letter-spacing="3">QUIZ REVIEW</text>
    <text x="72" y="360" class="jp" font-size="78" font-weight="1000" fill="#fff">機能語って</text>
    <text x="72" y="462" class="jp" font-size="92" font-weight="1000" fill="#ffe21f">なんだっけ？</text>
  </g>
  <g transform="translate(78 548)" filter="url(#shadow)">
    <path d="M0 0H474Q502 0 502 28V116Q502 144 474 144H86L43 194V144H28Q0 144 0 116V28Q0 0 28 0Z" fill="#101010" opacity=".92" stroke="#fff" stroke-opacity=".22" stroke-width="2"/>
    <text x="36" y="58" class="jp" font-size="34" font-weight="900" fill="#fff">何それ？</text>
    <text x="36" y="104" class="jp" font-size="24" font-weight="800" fill="#d9d9d9">まず答えてもらう</text>
  </g>
