<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#050505" stop-opacity=".85"/><stop offset=".58" stop-color="#050505" stop-opacity=".29"/><stop offset="1" stop-color="#050505" stop-opacity="0"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%"><feDropShadow dx="0" dy="14" stdDeviation="9" flood-color="#000" flood-opacity=".82"/><feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="1"/></filter>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffe21f" flood-opacity=".5"/><feDropShadow dx="0" dy="12" stdDeviation="11" flood-color="#000" flood-opacity=".72"/></filter>
    <style>.jp{font-family:Hiragino Sans,Yu Gothic,Meiryo,Avenir Next,Arial,sans-serif}.sans{font-family:Avenir Next,Montserrat,Arial,sans-serif}</style>
  </defs>
  <image href="bg-parts-of-speech.png" width="1920" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1920" height="1080" fill="url(#veil)"/>
  <g transform="translate(86 64)"><rect width="356" height="80" rx="40" fill="#111" opacity=".92"/><rect x="8" y="8" width="340" height="64" rx="32" fill="none" stroke="#ffe21f" stroke-width="4"/><text x="34" y="52" class="sans" font-size="31" font-weight="900" fill="#ffe21f" letter-spacing="2">LESSON 01</text></g>
  <g filter="url(#shadow)">
    <text x="92" y="244" class="sans" font-size="41" font-weight="900" fill="#ffe21f" letter-spacing="4">FUNCTION WORDS</text>
