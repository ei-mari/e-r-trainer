<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#000" stop-opacity=".74"/><stop offset=".6" stop-color="#000" stop-opacity=".24"/><stop offset="1" stop-color="#000" stop-opacity=".04"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".78"/><feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity=".95"/></filter>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffe21f" flood-opacity=".55"/><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000" flood-opacity=".65"/></filter>
    <style>.jp{font-family:Hiragino Sans,Yu Gothic,Meiryo,Avenir Next,Arial,sans-serif}.sans{font-family:Avenir Next,Montserrat,Arial,sans-serif}</style>
  </defs>
  <image href="rhythm-challenge-keyvisual.png" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="900" fill="url(#shade)"/>
  <g transform="translate(72 52)">
    <rect width="294" height="66" rx="33" fill="#111" opacity=".94"/><rect x="7" y="7" width="280" height="52" rx="26" fill="none" stroke="#ffe21f" stroke-width="3" opacity=".75"/>
    <text x="28" y="43" class="sans" font-size="25" font-weight="900" fill="#ffe21f" letter-spacing="2">LESSON 01</text>
  </g>
  <g filter="url(#shadow)">
    <text x="76" y="210" class="sans" font-size="34" font-weight="900" fill="#ffe21f" letter-spacing="3">MAGIC BOOK</text>
    <text x="72" y="324" class="jp" font-size="62" font-weight="1000" fill="#fff">品詞がわからなくても</text>
    <text x="72" y="418" class="jp" font-size="74" font-weight="1000" fill="#ffe21f">授業についていける</text>
    <text x="72" y="506" class="jp" font-size="62" font-weight="1000" fill="#fff">魔法の書を配ります</text>
  </g>
  <g transform="translate(82 608)" filter="url(#glow)">
    <rect width="760" height="124" rx="30" fill="#111" opacity=".94"/>
    <text x="42" y="54" class="jp" font-size="30" font-weight="1000" fill="#fff">Slack / Zoom のチャット欄を</text>
    <text x="42" y="95" class="jp" font-size="30" font-weight="1000" fill="#ffe21f">確認してね</text>
  </g>
</svg>
