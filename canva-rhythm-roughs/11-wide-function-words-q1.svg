<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#050505" stop-opacity=".82"/>
      <stop offset=".52" stop-color="#050505" stop-opacity=".22"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000" flood-opacity=".8"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="1"/>
    </filter>
    <style>.jp{font-family:Hiragino Sans,Yu Gothic,Meiryo,Avenir Next,Arial,sans-serif}.sans{font-family:Avenir Next,Montserrat,Arial,sans-serif}</style>
  </defs>
  <image href="bg-quiz-question.png" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="900" fill="url(#veil)"/>
  <g transform="translate(72 54)">
    <rect width="296" height="66" rx="33" fill="#111" opacity=".92"/>
    <rect x="7" y="7" width="282" height="52" rx="26" fill="none" stroke="#ffe21f" stroke-width="3"/>
    <text x="28" y="43" class="sans" font-size="25" font-weight="900" fill="#ffe21f" letter-spacing="2">LESSON 01</text>
  </g>
  <g filter="url(#shadow)">
    <text x="78" y="214" class="sans" font-size="34" font-weight="900" fill="#ffe21f" letter-spacing="3">QUIZ REVIEW</text>
    <text x="74" y="356" class="jp" font-size="80" font-weight="1000" fill="#fff">機能語って</text>
    <text x="74" y="466" class="jp" font-size="98" font-weight="1000" fill="#ffe21f">なんだっけ？</text>
  </g>
  <g transform="translate(80 558)" filter="url(#shadow)">
    <path d="M0 0H468Q496 0 496 28V112Q496 140 468 140H90L46 190V140H28Q0 140 0 112V28Q0 0 28 0Z" fill="#111" opacity=".92" stroke="#fff" stroke-opacity=".22" stroke-width="2"/>
    <text x="36" y="57" class="jp" font-size="34" font-weight="900" fill="#fff">何それ？</text>
    <text x="36" y="103" class="jp" font-size="24" font-weight="800" fill="#ddd">答えてもらう</text>
  </g>
</svg>
