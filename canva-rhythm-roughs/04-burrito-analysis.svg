  <g class="base">
    <text x="120" y="318"><tspan class="soft">G:</tspan> <tspan class="soft">Who</tspan> <tspan class="stress">cares?</tspan></text>
    <text x="120" y="402"><tspan class="soft">B:</tspan> <tspan class="stress">I care!</tspan> <tspan class="stress">All right?</tspan> <tspan class="stress">I care!</tspan></text>
    <text x="120" y="486"><tspan class="soft">I</tspan> <tspan class="stress">bust</tspan><tspan>ed my </tspan><tspan class="stress">ass</tspan> <tspan class="stress">all day</tspan> <tspan class="stress">clean</tspan><tspan>ing this </tspan><tspan class="stress">house</tspan></text>
    <text x="120" y="570"><tspan>and then </tspan><tspan class="stress">cook</tspan><tspan>ing </tspan><tspan class="stress">that meal.</tspan></text>
    <text x="120" y="654"><tspan>And I </tspan><tspan class="stress">worked</tspan><tspan class="soft"> today.</tspan></text>
    <text x="120" y="738"><tspan>It would be </tspan><tspan class="stress">nice</tspan><tspan> if you </tspan><tspan class="stress">said thank</tspan><tspan> you and </tspan><tspan class="stress">helped</tspan><tspan> me</tspan></text>
    <text x="120" y="812"><tspan>with the </tspan><tspan class="stress">dish</tspan><tspan>es.</tspan></text>
