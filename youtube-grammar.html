<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Grammar Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./youtube-grammar.css" />
  </head>
  <body>
    <div class="app">
      <main class="phone">
        <div class="camera"></div>
        <div class="scroll">
          <section class="card">
            <p class="eyebrow">YouTube Grammar</p>
            <h1>BREAK UP</h1>
            <p class="summary">
              例文を品詞と文のかたまりで見える化しています。
            </p>
            <div class="source-note">
              <a class="source-link" href="https://www.youtube.com/watch?v=xj7sYdMEKec" target="_blank" rel="noreferrer">
                YouTube動画
              </a>
              <span>から抜粋しています。</span>
              <span>① 0:34〜1:22</span>
              <span>② 2:54〜3:49</span>
            </div>
          </section>

          <section class="card dialogue-section">
            <p class="eyebrow">Examples</p>
            <div class="dialogue-list" id="dialogueList"></div>
          </section>
        </div>
        <button class="back-top" type="button" aria-label="一番上に戻る">↑</button>
      </main>
    </div>
    <script src="./youtube-grammar.js"></script>
  </body>
</html>
