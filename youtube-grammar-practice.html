<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Break Up Speaking Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./youtube-grammar-practice.css" />
  </head>
  <body>
    <div class="app">
      <main class="phone">
        <div class="camera"></div>
        <div class="scroll">
          <section class="card intro-card">
            <p class="eyebrow">GOAL</p>
            <h1>BREAK UP</h1>
            <p class="summary">
              こちらの課題のゴールは「英文だけを見てつまらずに読める」ようになることです。次の2ステップで練習をしましょう。
            </p>
            <ol class="goal-list">
              <li>例文だけを見て音読</li>
              <li>詰まったり難しい場合は音声を聞いて練習</li>
            </ol>
          </section>

          <section class="practice-step">
            <div class="practice-list" id="practiceList"></div>
          </section>
        </div>
        <button class="back-top" type="button" aria-label="一番上に戻る">↑</button>
      </main>
    </div>
    <script src="./youtube-grammar-practice.js?v=manual-audio-update"></script>
  </body>
</html>
