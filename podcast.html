<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eimari Podcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./audio-roleplay.css" />
  </head>
  <body>
    <div class="audio-app">
      <main class="audio-shell podcast-shell">
        <div class="audio-phone-camera"></div>
        <section class="audio-hero podcast-hero">
          <div class="audio-hero-image-wrap">
            <img class="audio-hero-image" src="./Eimari Thumbnail.png" alt="" />
          </div>
          <section class="audio-controls podcast-controls">
            <div class="podcast-actions">
              <a class="primary-button podcast-action" href="https://pocketcasts.com/submit/">Pocket Castsに登録</a>
              <a class="secondary-button podcast-action" href="https://ei-mari.github.io/e-r-trainer/podcast.xml">RSSを開く</a>
            </div>
            <p class="podcast-url">https://ei-mari.github.io/e-r-trainer/podcast.xml</p>
          </section>
          <div class="audio-hero-copy">
            <p class="audio-eyebrow">Podcast Feed</p>
            <h1>Eimari Roleplay Audio</h1>
            <p class="audio-summary">audio-roleplay の音声をPart 1〜3でPodcast形式にまとめています。</p>
          </div>
        </section>

        <div class="audio-scroll-content podcast-scroll-content">
          <section class="audio-list-wrap podcast-list-wrap">
            <div class="audio-list">
              <article class="audio-line podcast-episode">
                <div class="audio-line-head">
                  <div class="audio-line-main">
                    <div class="audio-line-meta">
                      <span class="audio-line-index">01</span>
                      <span class="speaker-badge detective">Part 1</span>
                    </div>
                    <p class="audio-line-text">Opening Questions</p>
                  </div>
                </div>
                <audio class="podcast-audio" controls preload="metadata" src="./podcast/part-1-opening-questions.mp3"></audio>
              </article>
              <article class="audio-line podcast-episode">
                <div class="audio-line-head">
                  <div class="audio-line-main">
                    <div class="audio-line-meta">
                      <span class="audio-line-index">02</span>
                      <span class="speaker-badge suspect">Part 2</span>
                    </div>
                    <p class="audio-line-text">After the Cafe</p>
                  </div>
                </div>
                <audio class="podcast-audio" controls preload="metadata" src="./podcast/part-2-after-the-cafe.mp3"></audio>
              </article>
              <article class="audio-line podcast-episode">
                <div class="audio-line-head">
                  <div class="audio-line-main">
                    <div class="audio-line-meta">
                      <span class="audio-line-index">03</span>
                      <span class="speaker-badge detective">Part 3</span>
                    </div>
                    <p class="audio-line-text">Serious Scene</p>
                  </div>
                </div>
                <audio class="podcast-audio" controls preload="metadata" src="./podcast/part-3-serious-scene.mp3"></audio>
              </article>
            </div>
          </section>
        </div>

        <a class="list-toggle-button podcast-back-link" href="./audio-roleplay.html">
          <span>通常プレイヤーを開く</span>
          <span class="list-toggle-icon" aria-hidden="true">→</span>
        </a>
      </main>
    </div>
  </body>
</html>
